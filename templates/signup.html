<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Sign Up</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}body{font-family:Arial,sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;background:#eef1f5}.box{background:#fff;padding:35px;width:460px;border-radius:6px;box-shadow:0 4px 30px rgba(0,0,0,.08)}h2{text-align:center;color:#2c3e50;margin-bottom:5px}.sub{text-align:center;color:#999;font-size:13px;margin-bottom:20px}.err{padding:10px;background:#fce4e4;border-left:4px solid #c0392b;color:#721c24;margin-bottom:15px;font-size:13px}.suc{padding:10px;background:#e8f5e9;border-left:4px solid #27ae60;color:#155724;margin-bottom:15px;font-size:13px}label{display:block;margin-bottom:3px;font-size:12px;font-weight:600;color:#555}input,select{width:100%;border:1px solid #ccc;padding:10px;font-size:14px;border-radius:3px;margin-bottom:10px}button{width:100%;padding:12px;background:#2c3e50;color:#fff;border:none;font-size:15px;font-weight:600;border-radius:3px;cursor:pointer}button:hover{background:#1a252f}.link{text-align:center;margin-top:12px;font-size:13px}.link a{color:#2c3e50;text-decoration:none;font-weight:600}
    </style>
</head>
<body>
    <div class="box">
        <h2>Create Account</h2>
        <p class="sub">Register and wait for admin approval</p>
        {% if error %}<div class="err">{{ error }}</div>{% endif %}
        {% if success %}<div class="suc">{{ success }}</div>{% endif %}
        <form method="POST">
            <label>Full Name</label><input type="text" name="full_name" required>
            <label>Phone Number</label><input type="text" name="phone" required>
            <label>Department</label><select name="department" required><option value="">Select</option>{% for d in departments %}<option value="{{ d }}">{{ d }}</option>{% endfor %}</select>
            <label>Branch</label><select name="branch"><option value="">Select</option>{% for b in branches %}<option value="{{ b }}">{{ b }}</option>{% endfor %}</select>
            <label>Password</label><input type="password" name="password" required>
            <button type="submit">Register</button>
        </form>
        <p class="link">Already have an account? <a href="/login">Sign In</a></p>
    </div>
</body>
</html>
