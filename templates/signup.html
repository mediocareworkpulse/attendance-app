<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mediocare Pharmaceutical Ltd — Register</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',system-ui,-apple-system,sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;background:linear-gradient(135deg,#0b2b4a,#134b6e);padding:20px}
        .box{background:rgba(255,255,255,0.95);padding:40px 32px;width:520px;max-width:100%;border-radius:24px;box-shadow:0 30px 60px rgba(0,0,0,0.25);backdrop-filter:blur(10px);}
        h2{font-size:24px;font-weight:700;color:#0b2b4a;text-align:center;margin-bottom:6px;}
        .sub{color:#5c6b7a;font-size:14px;text-align:center;margin-bottom:28px;}
        .err{padding:14px 18px;background:#fef0ef;border-left:4px solid #e74c3c;color:#c0392b;margin-bottom:20px;font-size:13px;border-radius:8px;}
        .suc{padding:16px;background:#edfaf2;border-left:4px solid #27ae60;color:#1e7e34;margin-bottom:20px;font-size:14px;border-radius:8px;text-align:center;font-weight:600;}
        label{display:block;margin-bottom:5px;font-size:11px;font-weight:700;color:#4a5568;text-transform:uppercase;letter-spacing:0.5px;}
        input,select{width:100%;border:1.5px solid #dde1e6;padding:12px 16px;font-size:14px;border-radius:10px;margin-bottom:16px;transition:all 0.25s;}
        input:focus,select:focus{outline:none;border-color:#0b2b4a;box-shadow:0 0 0 4px rgba(11,43,74,0.1);}
        .input-group{position:relative;}
        .input-group input{padding-right:48px;}
        .toggle-pw{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:18px;color:#8899aa;}
        button[type="submit"]{width:100%;padding:16px;background:#0b2b4a;color:#fff;border:none;font-size:15px;font-weight:700;border-radius:10px;cursor:pointer;transition:all 0.3s;}
        button[type="submit"]:hover{background:#134b6e;transform:translateY(-2px);box-shadow:0 8px 20px rgba(11,43,74,0.3);}
        .link{text-align:center;margin-top:20px;font-size:13px;color:#5c6b7a;}
        .link a{color:#0b2b4a;text-decoration:none;font-weight:700;}
    </style>
</head>
<body>
<div class="box">
    <h2>💊 Mediocare Pharmaceutical Ltd</h2>
    <p class="sub">Create your account — pending admin approval</p>
    {% if error %}<div class="err">{{ error }}</div>{% endif %}
    {% if success %}<div class="suc">✅ {{ success }}</div>{% endif %}
    <form method="POST">
        <label>Full Name</label><input type="text" name="full_name" required placeholder="Your full name">
        <label>Phone Number</label><input type="tel" name="phone" required placeholder="e.g. 0712345678">
        <label>Department</label><select name="department" required><option value="">Select</option>{% for d in departments %}<option value="{{ d }}">{{ d }}</option>{% endfor %}</select>
        <label>Branch</label><select name="branch"><option value="">Select</option>{% for b in branches %}<option value="{{ b }}">{{ b }}</option>{% endfor %}</select>
        <label>Role</label><select name="role" required><option value="">Select Role</option>{% for r in roles %}<option value="{{ r }}">{{ r }}</option>{% endfor %}</select>
        <div style="display:flex;gap:10px;">
            <div style="flex:1;"><label>Shift Start</label><input type="time" name="shift_start" value="08:00" required></div>
            <div style="flex:1;"><label>Shift End</label><input type="time" name="shift_end" value="17:00" required></div>
        </div>
        <label>Password</label>
        <div class="input-group">
            <input type="password" name="password" id="signupPw" required placeholder="Create a password">
            <button type="button" class="toggle-pw" onclick="togglePw()">👁️</button>
        </div>
        <button type="submit">Register</button>
    </form>
    <p class="link">Already have an account? <a href="/login">Sign In</a></p>
</div>
<script>function togglePw(){var p=document.getElementById('signupPw');var b=event.target;if(p.type==='password'){p.type='text';b.textContent='🙈'}else{p.type='password';b.textContent='👁️'}}</script>
</body>
</html>
