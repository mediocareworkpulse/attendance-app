<form method="POST" id="saleForm">
    <!-- existing inputs -->
</form>
<button class="btn" onclick="confirmSale()">Submit Sale</button>

<div id="saleConfirmModal" class="modal-overlay" style="display:none;">
    <div class="modal-box">
        <h3>Confirm Sale</h3>
        <p id="saleSummary"></p>
        <div class="modal-actions">
            <button class="btn" onclick="submitSale()">✅ Confirm</button>
            <button class="btn" style="background:#999;" onclick="closeSaleConfirm()">Cancel</button>
        </div>
    </div>
</div>
<script>
function confirmSale() {
    const mpesa = document.querySelector('input[name="mpesa_sales"]').value;
    const cash = document.querySelector('input[name="cash_sales"]').value;
    const total = (parseFloat(mpesa) + parseFloat(cash)).toFixed(2);
    document.getElementById('saleSummary').innerHTML = `M‑Pesa: Ksh ${mpesa}<br>Cash: Ksh ${cash}<br><strong>Total: Ksh ${total}</strong>`;
    document.getElementById('saleConfirmModal').style.display = 'flex';
}
function closeSaleConfirm() {
    document.getElementById('saleConfirmModal').style.display = 'none';
}
function submitSale() {
    document.getElementById('saleForm').submit();
}
</script>
