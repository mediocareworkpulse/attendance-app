<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mediocare Pharmaceutical Ltd — Sign In</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',system-ui,-apple-system,sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;background:linear-gradient(135deg,#0b2b4a 0%,#134b6e 100%);padding:20px}
        .container{display:flex;width:880px;max-width:100%;background:rgba(255,255,255,0.95);border-radius:24px;overflow:hidden;box-shadow:0 30px 60px rgba(0,0,0,0.25);backdrop-filter:blur(10px);}
        .left{flex:1;background:linear-gradient(135deg,#0b2b4a,#134b6e);padding:60px 40px;display:flex;flex-direction:column;justify-content:center;color:#fff;position:relative;overflow:hidden;}
        .left::before{content:'';position:absolute;top:-100px;right:-100px;width:300px;height:300px;background:rgba(255,255,255,0.05);border-radius:50%;}
        .left .logo{font-size:48px;margin-bottom:20px;filter:drop-shadow(0 4px 8px rgba(0,0,0,0.3));}
        .left h1{font-size:32px;font-weight:800;margin-bottom:12px;line-height:1.2;}
        .left .tagline{color:rgba(255,255,255,0.75);font-size:15px;line-height:1.6;}
        .right{flex:1;padding:60px 40px;display:flex;flex-direction:column;justify-content:center;}
        .right h2{font-size:24px;font-weight:700;color:#0b2b4a;margin-bottom:6px;}
        .right .sub{color:#5c6b7a;font-size:14px;margin-bottom:32px;}
        .err{padding:14px 18px;background:#fef0ef;border-left:4px solid #e74c3c;color:#c0392b;margin-bottom:24px;font-size:13px;border-radius:8px;font-weight:500;}
        label{display:block;margin-bottom:6px;font-size:12px;font-weight:700;color:#4a5568;text-transform:uppercase;letter-spacing:0.5px;}
        .input-group{position:relative;margin-bottom:20px;}
        .input-group input{width:100%;border:1.5px solid #dde1e6;padding:14px 48px 14px 16px;font-size:14px;border-radius:10px;transition:all 0.25s;}
        .input-group input:focus{outline:none;border-color:#0b2b4a;box-shadow:0 0 0 4px rgba(11,43,74,0.1);}
        .toggle-pw{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:18px;color:#8899aa;padding:4px;}
        button[type="submit"]{width:100%;padding:16px;background:#0b2b4a;color:#fff;border:none;font-size:15px;font-weight:700;border-radius:10px;cursor:pointer;transition:all 0.3s;letter-spacing:0.3px;}
        button[type="submit"]:hover{background:#134b6e;transform:translateY(-2px);box-shadow:0 8px 20px rgba(11,43,74,0.3);}
        .link{text-align:center;margin-top:24px;font-size:13px;color:#5c6b7a;}
        .link a{color:#0b2b4a;text-decoration:none;font-weight:700;}
        @media(max-width:768px){.container{flex-direction:column;}.left{padding:40px 30px;}.right{padding:40px 30px;}}
    </style>
</head>
<body>
<div class="container">
    <div class="left">
        <div class="logo">💊</div>
        <h1>Mediocare Pharmaceutical Ltd</h1>
        <p class="tagline">Excellence in pharmaceutical distribution. Attendance & Sales Management.</p>
    </div>
    <div class="right">
        <h2>Welcome Back</h2>
        <p class="sub">Sign in to your account</p>
        {% if error %}<div class="err">{{ error }}</div>{% endif %}
        <form method="POST">
            <label>Full Name</label>
            <div class="input-group">
                <input type="text" name="full_name" required placeholder="Enter your full name" autofocus>
            </div>
            <label>Password</label>
            <div class="input-group">
                <input type="password" name="password" id="password" required placeholder="Enter your password">
                <button type="button" class="toggle-pw" onclick="togglePassword()">👁️</button>
            </div>
            <button type="submit">Sign In</button>
        </form>
        <p class="link">Don't have an account? <a href="/signup">Create Account</a></p>
    </div>
</div>
<script>
function togglePassword(){var p=document.getElementById('password');var b=event.target;if(p.type==='password'){p.type='text';b.textContent='🙈'}else{p.type='password';b.textContent='👁️'}}
</script>
</body>
</html>
