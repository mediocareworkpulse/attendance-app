<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mediocare Pharmaceutical Ltd — Sign In</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;background:linear-gradient(135deg,#0d3b66 0%,#1a5c8a 50%,#2a7faa 100%);padding:15px}
        .container{display:flex;width:850px;max-width:100%;background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 25px 80px rgba(0,0,0,.3)}
        .left{flex:1;background:linear-gradient(135deg,#0d3b66,#1a5c8a);padding:50px 40px;display:flex;flex-direction:column;justify-content:center;color:#fff}
        .left .logo{font-size:40px;margin-bottom:15px}
        .left h1{font-size:28px;font-weight:800;letter-spacing:-.5px;margin-bottom:8px}
        .left .tagline{color:#8ecae6;font-size:14px;line-height:1.6}
        .right{flex:1;padding:50px 40px;display:flex;flex-direction:column;justify-content:center}
        .right h2{font-size:22px;font-weight:700;color:#0d3b66;margin-bottom:5px}
        .right .sub{color:#999;font-size:13px;margin-bottom:30px}
        .err{padding:12px 15px;background:#fef0ef;border-left:4px solid #e74c3c;color:#c0392b;margin-bottom:20px;font-size:13px;border-radius:6px;font-weight:500}
        label{display:block;margin-bottom:5px;font-size:12px;font-weight:600;color:#555;text-transform:uppercase;letter-spacing:.5px}
        .input-group{position:relative;margin-bottom:18px}
        .input-group input{width:100%;border:1.5px solid #e0e0e0;padding:13px 45px 13px 15px;font-size:14px;border-radius:8px;transition:border-color .2s}
        .input-group input:focus{outline:none;border-color:#0d3b66}
        .input-group .toggle-pw{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:18px;color:#999;padding:5px;width:auto;box-shadow:none}
        .input-group .toggle-pw:hover{background:none;box-shadow:none;color:#555}
        button[type="submit"]{width:100%;padding:14px;background:#0d3b66;color:#fff;border:none;font-size:15px;font-weight:700;border-radius:8px;cursor:pointer;letter-spacing:.3px;transition:all .2s}
        button[type="submit"]:hover{background:#0f4c7a;transform:translateY(-1px);box-shadow:0 8px 20px rgba(0,0,0,.15)}
        .link{text-align:center;margin-top:20px;font-size:13px;color:#999}
        .link a{color:#0d3b66;text-decoration:none;font-weight:700}
        @media(max-width:768px){
            .container{flex-direction:column;width:100%;border-radius:12px}
            .left{padding:30px 25px;text-align:center}
            .left h1{font-size:22px}
            .left .logo{font-size:32px}
            .right{padding:30px 25px}
            .right h2{font-size:20px}
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="left">
            <div class="logo">💊</div>
            <h1>Mediocare Pharmaceutical Ltd</h1>
            <p class="tagline">Attendance & Sales Management System. Excellence in pharmaceutical distribution.</p>
        </div>
        <div class="right">
            <h2>Welcome Back</h2>
            <p class="sub">Sign in to your account</p>
            {% if error %}<div class="err">{{ error }}</div>{% endif %}
            <form method="POST">
                <label>Full Name</label>
                <div class="input-group">
                    <input type="text" name="full_name" required placeholder="Enter your full name" autofocus autocomplete="name">
                </div>
                <label>Password</label>
                <div class="input-group">
                    <input type="password" name="password" id="password" required placeholder="Enter your password" autocomplete="current-password">
                    <button type="button" class="toggle-pw" onclick="togglePassword()" aria-label="Show password">👁️</button>
                </div>
                <button type="submit">Sign In</button>
            </form>
            <p class="link">Don't have an account? <a href="/signup">Create Account</a></p>
        </div>
    </div>
    <script>
        function togglePassword(){
            var pw=document.getElementById('password');
            var btn=event.target;
            if(pw.type==='password'){pw.type='text';btn.textContent='🙈';}
            else{pw.type='password';btn.textContent='👁️';}
        }
    </script>
</body>
</html>
