<!-- inside the checked_in block -->
<form method="POST" action="/check-in" id="checkoutForm" style="display:none;">
    <input type="hidden" name="action" value="check_out">
    <input type="hidden" name="lat" id="lat"><input type="hidden" name="lng" id="lng"><input type="hidden" name="location" id="loc">
</form>
<button class="checkin-btn btn-check-out" onclick="confirmCheckOut()">🚪 Check Out Now</button>

<!-- Confirmation Modal -->
<div id="confirmModal" class="modal-overlay" style="display:none;">
    <div class="modal-box">
        <h3>Confirm Check‑Out</h3>
        <p>Are you sure you want to end your shift now?</p>
        <div class="modal-actions">
            <button class="btn-danger" onclick="submitCheckOut()">Yes, Check Out</button>
            <button class="btn" style="background:#999;" onclick="closeConfirm()">Cancel</button>
        </div>
    </div>
</div>

<script>
function confirmCheckOut() {
    document.getElementById('confirmModal').style.display = 'flex';
}
function closeConfirm() {
    document.getElementById('confirmModal').style.display = 'none';
}
function submitCheckOut() {
    document.getElementById('checkoutForm').submit();
}
</script>
